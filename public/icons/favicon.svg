<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="horizon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(56,189,248,0.3)"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="30%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="70%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="rgba(56,189,248,0.15)" stroke-width="20"/>
  <!-- Main ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#ring)" stroke-width="44"/>
  <!-- Inner ring detail -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="48"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#ring)" stroke-width="40"/>
  <!-- Ring edge highlights -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="rgba(203,213,225,0.4)" stroke-width="2"/>
  <circle cx="256" cy="256" r="208" fill="none" stroke="rgba(203,213,225,0.3)" stroke-width="1.5"/>
  <!-- Chevrons (9 around the ring) -->
  <g fill="#f59e0b" stroke="#b45309" stroke-width="2">
    <polygon points="256,28 242,58 270,58" transform="rotate(0,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(40,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(80,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(120,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(160,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(200,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(240,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(280,256,256)"/>
    <polygon points="256,28 242,58 270,58" transform="rotate(320,256,256)"/>
  </g>
  <!-- Active chevron glow (top) -->
  <polygon points="256,24 238,60 274,60" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#innerGlow)" opacity="0.9"/>
  <!-- Event horizon -->
  <circle cx="256" cy="256" r="186" fill="url(#horizon)" filter="url(#innerGlow)"/>
  <!-- Ripple effects -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(125,211,252,0.25)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="rgba(125,211,252,0.2)" stroke-width="1"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="rgba(125,211,252,0.15)" stroke-width="0.8"/>
  <!-- Center bright spot -->
  <circle cx="256" cy="256" r="30" fill="rgba(186,230,253,0.4)"/>
</svg>
