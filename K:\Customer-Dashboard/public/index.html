<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>👥 Customers</h1>
        <button id="btn-add-customer" class="btn btn-primary btn-sm" title="Add Customer">＋</button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="customer-search" placeholder="Search customers…" autocomplete="off">
      </div>
      <ul id="customer-list"></ul>
    </aside>
    <main id="main-content">
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">👥</div>
        <h2>Customer Dashboard</h2>
        <p>Select a customer from the sidebar or add a new one to get started.</p>
      </div>
      <div id="customer-view" class="hidden">
        <header id="customer-header">
          <div class="customer-avatar" id="customer-avatar"></div>
          <div class="customer-info">
            <h2 id="customer-name"></h2>
            <div class="customer-meta">
              <span id="customer-org" class="badge"></span>
              <span id="customer-role" class="badge"></span>
              <span id="customer-ghes" class="badge"></span>
              <span id="customer-tier" class="badge"></span>
              <span id="customer-slack" class="badge"></span>
            </div>
          </div>
          <div class="customer-header-actions">
            <button id="btn-edit-customer" class="btn btn-ghost btn-sm">✏️ Edit</button>
            <button id="btn-delete-customer" class="btn btn-danger btn-sm">🗑️ Delete</button>
          </div>
        </header>
        <nav id="tabs">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="notes">Notes</button>
          <button class="tab" data-tab="tickets">Zendesk</button>
          <button class="tab" data-tab="meetings">Meetings</button>
          <button class="tab" data-tab="actions">Action Items</button>
          <button class="tab" data-tab="health">Health Checks</button>
        </nav>
        <div id="tab-content"></div>
      </div>
    </main>
  </div>

  <!-- Customer Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
